name: Unified Trading Bot v1.0

on:
  schedule:
    - cron: '0 11 * * 1-5'   # KST 20:00 (월~금)
    - cron: '0 16 * * 0-4'   # KST 01:00 (화~토 새벽)
    - cron: '0 22 * * 0-4'   # KST 07:00 (화~토 아침)
  workflow_dispatch:

permissions:
  contents: write # 👈 Push 권한 부여 (필수)

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements_unified.txt') }}

      - name: Install
        run: pip install -r requirements_unified.txt

      - name: Run bot
        env:
          KIS_APPKEY:       ${{ secrets.KIS_APPKEY }}
          KIS_SECRET:       ${{ secrets.KIS_SECRET }}
          KIS_CANO:         ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTIONS:   'true'
        run: python app_unified.py # 👈 실제 파일명과 반드시 일치시킬 것!

      - name: Commit state & logs
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          # 파일이 없을 경우 대비하여 생성 로직 포함
          git add trend_state.json rotation_state.json history_trend.csv history_rotation.csv || true
          git diff --staged --quiet || (git commit -m "unified update [$(date +'%Y-%m-%d %H:%M')]" && git pull --rebase && git push)
