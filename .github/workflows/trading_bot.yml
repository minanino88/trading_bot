name: Unified Trading Bot v1.4.2

on:
  schedule:
    - cron: '16 11 * * 1-5'  # KST 20:16 (월~금) - 지연 방지를 위해 16분으로 셋팅
    - cron: '7 16 * * 1-5'   # KST 01:07 (화~토 새벽)
    - cron: '7 22 * * 1-5'   # KST 07:07 (화~토 아침)
  workflow_dispatch:        # 수동 버튼 활성화

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          KIS_APPKEY:       ${{ secrets.KIS_APPKEY }}
          KIS_SECRET:       ${{ secrets.KIS_SECRET }}
          KIS_CANO:         ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTIONS:   'true'
        run: python app.py

      - name: Commit state & logs
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add trend_state.json rotation_state.json history_trend.csv history_rotation.csv || true
          git diff --staged --quiet || (git commit -m "auto-update [$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST]" && git pull --rebase && git push)
